<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YNAC — Signing you in</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #faf7f2;
      color: #1c1c1c;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #131312; color: #f1ece2; }
    }
    .card { text-align: center; }
    .spinner {
      width: 24px; height: 24px;
      border: 2px solid rgba(128,128,128,0.3);
      border-top-color: #4d7c5f;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error { color: #a44a4a; max-width: 40ch; }
  </style>
</head>
<body>
  <div class="card">
    <div class="spinner"></div>
    <div id="msg">Signing you in&hellip;</div>
  </div>
  <script>
    (function () {
      const hash = window.location.hash.startsWith('#')
        ? window.location.hash.slice(1)
        : window.location.hash;
      const params = new URLSearchParams(hash);
      const token = params.get('access_token');
      const expiresIn = parseInt(params.get('expires_in') || '0', 10);
      const err = params.get('error');

      if (err) {
        document.getElementById('msg').innerHTML =
          '<div class="error">Sign-in failed: ' + err + '. <a href="./">Try again</a>.</div>';
        return;
      }

      if (!token) {
        document.getElementById('msg').innerHTML =
          '<div class="error">No access token returned. <a href="./">Try again</a>.</div>';
        return;
      }

      try {
        const expiresAt = Date.now() + (expiresIn ? expiresIn * 1000 : 2 * 60 * 60 * 1000);
        localStorage.setItem('ynac.token', JSON.stringify({ token: token, expiresAt: expiresAt }));
      } catch (e) {
        document.getElementById('msg').innerHTML =
          '<div class="error">Could not save token to localStorage. ' + (e && e.message) + '</div>';
        return;
      }

      window.location.replace('./');
    })();
  </script>
</body>
</html>
